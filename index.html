<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>ペット監視カメラ</title>
<style>
video {
  width: 100%;
  max-width: 600px;
}
button {
  padding: 10px 20px;
  font-size: 18px;
}
</style>
</head>
<body>

<h2>🐾 ペット監視カメラ</h2>

<video id="local-video" autoplay playsinline muted></video>

<br><br>

<button id="start-video">
カメラ起動
</button>

<script>
document.getElementById("start-video").onclick = async () => {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: true,
      audio: false
    });

    document.getElementById("local-video").srcObject = stream;

    alert("カメラ接続成功！");
  } catch(err) {
    console.error(err);
    alert(err.message);
  }
};
</script>

</body>
</html>
