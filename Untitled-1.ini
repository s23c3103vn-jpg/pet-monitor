<script src="https://cdn.jsdelivr.net/npm/@skyway-sdk/core@latest/dist/skyway_core.js"></script>
    <style>
        video { width: 100%; max-width: 400px; background: #000; border-radius: 8px; }
        .container { padding: 20px; font-family: sans-serif; }
        button { padding: 10px 20px; font-size: 16px; margin-top: 10px; }
    </style>
</head>
<body>
<div class="container">
    <h2>🐾 ペット監視カメラ</h2>
    
    <video id="local-video" autoplay playsinline muted></video>
    <p>※自分のカメラ映像（配信時のみ表示）</p>

    <hr>

    <video id="remote-video" autoplay playsinline></video>
    <p>※相手のカメラ映像（受信時のみ表示）</p>

    <button id="start-video">① カメラを起動して配信</button>
    <button id="join-room">② 映像を見る（外出先用）</button>
</div>

<script>
    // ⚠️ 先ほど取得したあなたのAppIDに書き換えてください
    const SKYWAY_APP_ID = 'YOUR_SKYWAY_APP_ID'; 
    
    let localStream;
    let context;
    let room;

    // 最新のCore版の書き方に統一します
    const { SkyWayContext, SkyWayRoom, SkyWayStreamFactory } = skyway_core;
    // ① カメラを起動してルームに入室（自宅PC側）
    document.getElementById('start-video').addEventListener('click', async () => {
        // WEBカメラのAPI (getUserMedia) を使って映像を取得
        localStream = await SkyWayStreamFactory.createCameraVideoStream();
        document.getElementById('local-video').srcObject = localStream;

        // SkyWayに接続
        context = await SkyWayContext.Create({ appId: SKYWAY_APP_ID });
        room = await SkyWayRoom.FindOrCreate(context, { type: 'p2p', name: 'pet-monitor-room' });
        const me = await room.join();

        // 自分の映像をルームに公開（配信スタート）
        await me.publish(localStream);
        alert('カメラ映像の配信を開始しました！部屋を開いたままにしてください。');
    });

    // ② ルームに入って映像を受信（外出先スマホ側）
    document.getElementById('join-room').addEventListener('click', async () => {
        context = await SkyWayContext.Create({ appId: SKYWAY_APP_ID });
        room = await SkyWayRoom.FindOrCreate(context, { type: 'p2p', name: 'pet-monitor-room' });
        const me = await room.join();

        // ルームにすでにある映像（自宅カメラ）を拾って表示する関数
        const subscribeAndAttach = async (publication) => {
            if (publication.publisher.id === me.id) return; // 自分の映像は無視
            const { stream } = await me.subscribe(publication.id);
            document.getElementById('remote-video').srcObject = stream;
        };

        // すでに配信されている映像をチェック
        room.publications.forEach(subscribeAndAttach);
        // 新しく配信が始まったら自動受信
        room.onStreamPublished.add((e) => subscribeAndAttach(e.publication));
        alert('受信モードになりました！');
    });
</script>
</body>
</html>
